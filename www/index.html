<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Codex Limit Watch Web</title>
<link rel="stylesheet" href="/styles.css?token=__TOKEN__" />
</head>
<body>
<header class="header">
  <div class="topbar">
    <div class="title">
      <h1>Codex Web</h1>
      <span id="stateBadge" class="badge">loading</span>
      <span id="limitBadge" class="badge">loading</span>
      <label class="model-select-wrap"><span>Model:</span><select id="modelSelect"></select></label>
      <label class="model-select-wrap effort-select-wrap"><span>Effort:</span><select id="effortSelect"></select></label>
      <button id="headerCollapseBtn" class="mobile-collapse-btn icon-only" title="Collapse header" aria-expanded="true"><span class="icon icon-chevron-up" aria-hidden="true"></span></button>
    </div>
    <div class="header-tools">
      <div id="envMeta" class="env-meta"></div>
    </div>
    <button id="themeBtn" class="theme-btn icon-only" title="Switch theme"><span class="icon icon-moon" aria-hidden="true"></span></button>
  </div>
  <div id="countdownNotice" class="countdown-notice hidden"><span>Sending next prompt soon</span><button id="cancelSendBtn" class="danger">Cancel send</button></div>
  <div id="statusNotice" class="status-notice hidden" role="status" aria-live="polite"></div>
  <div class="header-grid">
    <div class="meta" id="meta"></div>
    <div class="limit-stats-wrap">
      <div class="limit-stats" id="limitStats"></div>
    </div>
  </div>
</header>
<div id="sessionPicker" class="session-list hidden"></div>
<div id="approvalBox" class="approval hidden"></div>
<div id="confirmBox" class="confirm hidden"></div>
<div id="helpBox" class="confirm hidden"></div>
<div id="scheduleBox" class="confirm hidden"></div>
<div id="limitResetBox" class="confirm hidden"></div>
<main class="main">
  <section class="panel queue-panel">
    <div class="panel-head"><h2>Queue <span id="queueCountBadge" class="count-badge">0</span></h2><div class="panel-actions queue-head-actions"><button id="queueCollapseBtn" class="mobile-collapse-btn icon-only" title="Collapse queue" aria-expanded="true"><span class="icon icon-chevron-up" aria-hidden="true"></span></button><button id="undoBtn" title="Undo last"><span class="icon icon-undo" aria-hidden="true"></span>Undo</button><div class="menu-wrap"><button id="queueMenuBtn" class="icon-only" aria-haspopup="menu" aria-expanded="false" title="Queue actions"><span class="icon icon-menu" aria-hidden="true"></span></button><div id="queueMenu" class="queue-menu hidden" role="menu"><button id="undoMenuBtn" class="mobile-menu-item" role="menuitem"><span class="icon icon-undo" aria-hidden="true"></span>Undo last</button><button id="clearBtn" role="menuitem"><span class="icon icon-clear" aria-hidden="true"></span>Clear pending</button><button id="clearCompletedBtn" role="menuitem"><span class="icon icon-check" aria-hidden="true"></span>Clear completed</button></div></div></div></div>
    <div id="queueTabs" class="queue-tabs"></div>
    <div id="queue" class="panel-body"></div>
  </section>
  <section class="panel output-panel">
    <div class="panel-head"><h2>Output</h2><div class="panel-actions output-head-actions"><button id="outputCollapseBtn" class="mobile-collapse-btn icon-only" title="Collapse output" aria-expanded="true"><span class="icon icon-chevron-up" aria-hidden="true"></span></button><button id="bottomBtn" class="desktop-panel-action"><span class="icon icon-arrow-down" aria-hidden="true"></span>Scroll to bottom</button><button id="copyOutputBtn" class="desktop-panel-action"><span class="icon icon-duplicate" aria-hidden="true"></span>Copy visible</button><button id="clearOutputBtn" class="desktop-panel-action"><span class="icon icon-clear" aria-hidden="true"></span>Clear output</button><div class="menu-wrap output-menu-wrap"><button id="outputMenuBtn" class="icon-only mobile-panel-menu-btn" aria-haspopup="menu" aria-expanded="false" title="Output actions"><span class="icon icon-menu" aria-hidden="true"></span></button><div id="outputMenu" class="queue-menu output-menu hidden" role="menu"><button id="bottomMenuBtn" role="menuitem"><span class="icon icon-arrow-down" aria-hidden="true"></span>Scroll to bottom</button><button id="copyOutputMenuBtn" role="menuitem"><span class="icon icon-duplicate" aria-hidden="true"></span>Copy visible</button><button id="clearOutputMenuBtn" role="menuitem"><span class="icon icon-clear" aria-hidden="true"></span>Clear output</button></div></div></div></div>
    <div id="output" class="panel-body output"></div>
  </section>
</main>
<section class="composer">
  <div class="composer-title">Composer</div>
  <div class="composer-input-wrap">
    <textarea id="composer" spellcheck="false" placeholder="Write a prompt or command. Cmd+Enter/Ctrl+Enter sends when idle. Try /think, /think!, /compact, or /help."></textarea>
    <div id="composerGhost" class="composer-ghost" aria-hidden="true"></div>
    <div id="composerArgHint" class="composer-arg-hint" aria-hidden="true"></div>
  </div>
  <div id="composerCommandStack" class="composer-command-stack" aria-hidden="true"></div>
  <div class="composer-row">
    <div class="composer-actions">
      <button id="addBtn" class="primary"><span class="icon icon-add" aria-hidden="true"></span>Add to queue</button>
      <button id="pauseBtn"><span class="icon icon-pause" aria-hidden="true"></span>Pause</button>
      <button id="resumeBtn"><span class="icon icon-play" aria-hidden="true"></span>Resume</button>
      <button id="scheduleBtn"><span class="icon icon-schedule" aria-hidden="true"></span>Schedule</button>
      <button id="interruptBtn" class="danger hidden">Interrupt</button>
      <button id="stopBtn" class="danger"><span class="icon icon-stop" aria-hidden="true"></span>Stop server</button>
    </div>
    <div id="counter" class="counter">Lines: 0 · Chars: 0</div>
  </div>
</section>
<div id="shutdownOverlay" class="shutdown-overlay hidden" role="alertdialog" aria-modal="true" aria-labelledby="shutdownTitle">
  <div class="shutdown-modal">
    <h2 id="shutdownTitle">Codex Web has exited</h2>
    <p>Open a new codex-web instance to continue.</p>
  </div>
</div>
<script>window.CODEX_LIMIT_WATCH_TOKEN = "__TOKEN__";</script>
<script type="importmap">
{
  "imports": {
    "#core/api": "/src/core/api.js",
    "#core/bootstrap": "/src/core/bootstrap.js",
    "#core/events": "/src/core/events.js",
    "#core/output-patch": "/src/core/output-patch.js",
    "#core/renderer": "/src/core/renderer.js",
    "#core/state": "/src/core/state.js",
    "#features/composer": "/src/features/composer/index.js",
    "#features/output": "/src/features/output/index.js",
    "#features/queue": "/src/features/queue/index.js",
    "#ui/approval": "/src/ui/approval.js",
    "#ui/confirm": "/src/ui/confirm.js",
    "#ui/header": "/src/ui/header.js",
    "#ui/help": "/src/ui/help.js",
    "#ui/html": "/src/ui/html.js",
    "#ui/limit-reset": "/src/ui/limit-reset.js",
    "#ui/schedule": "/src/ui/schedule.js",
    "#ui/sessions": "/src/ui/sessions.js",
    "#utils/dom": "/src/utils/dom.js",
    "#utils/format": "/src/utils/format.js"
  }
}
</script>
<script type="module" src="/app.js"></script>
</body>
</html>
